name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      # NOTE: SelectBuilder 当前引用的是旧版 DSP 的 API（GIRer / PlayerAction_Build.previewPose 等在新版
      # Assembly-CSharp 中已不存在），暂时从 CI 中排除，待代码适配后再加回来。
      - name: Build BetterStarmap
        run: dotnet build BetterStarmap/BetterStarmap.csproj -c Release

      - name: Build AutoStellarNavigate
        run: dotnet build StellarAutoNavigation/AutoStellarNavigate.csproj -c Release

      - name: Upload plugin DLLs
        uses: actions/upload-artifact@v4
        with:
          name: DspMods-dlls
          path: |
            **/bin/Release/**/BetterStarmap.dll
            **/bin/Release/**/AutoStellerNavigate.dll
            **/bin/Release/**/Common.dll
          if-no-files-found: error
